<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android ADB Toolkit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; 
               background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
               min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; 
                    background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                    padding: 30px; }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #999; margin-bottom: 30px; }
        .section { margin-bottom: 40px; }
        .section h2 { color: #667eea; font-size: 18px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        input, button, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px;
                               font-size: 14px; }
        input { width: 100%; }
        button { background: #667eea; color: white; border: none; cursor: pointer;
                font-weight: 500; padding: 10px 20px; }
        button:hover { background: #764ba2; }
        .output { background: #f5f5f5; border-left: 4px solid #667eea; padding: 15px;
                 border-radius: 4px; font-family: monospace; font-size: 12px;
                 max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .status { padding: 10px; border-radius: 4px; margin-top: 10px; }
        .status.ok { background: #d4edda; color: #155724; }
        .status.err { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="container">
    <h1>📱 Android ADB Toolkit</h1>
    <p class="subtitle">Requires: adb running locally (must run this on your PC, not in browser)</p>

    <div class="section">
        <h2>Device Info</h2>
        <button onclick="runCmd('adb shell getprop ro.product.model')">Model</button>
        <button onclick="runCmd('adb shell getprop ro.build.version.release')">Android Version</button>
        <button onclick="runCmd('adb shell wm size')">Screen Size</button>
        <button onclick="runCmd('adb shell dumpsys battery | grep level')">Battery</button>
        <div class="output" id="output-info"></div>
    </div>

    <div class="section">
        <h2>App Control</h2>
        <input type="text" id="pkg-name" placeholder="Package name (e.g. com.example.app)">
        <div class="grid">
            <button onclick="appAction('install')">Install APK</button>
            <button onclick="appAction('uninstall')">Uninstall</button>
            <button onclick="appAction('launch')">Launch</button>
            <button onclick="appAction('stop')">Force Stop</button>
        </div>
        <div class="output" id="output-app"></div>
    </div>

    <div class="section">
        <h2>Settings</h2>
        <div class="grid">
            <button onclick="runCmd('adb shell settings put global limit_ad_tracking 1')">Disable Ad Tracking</button>
            <button onclick="runCmd('adb shell settings put secure location_mode 0')">Disable Location</button>
            <button onclick="runCmd('adb shell settings put system screen_brightness 200')">Max Brightness</button>
            <button onclick="runCmd('adb shell settings put system screen_brightness 100')">Dim Brightness</button>
        </div>
        <div class="output" id="output-settings"></div>
    </div>

    <div class="section">
        <h2>Network & Files</h2>
        <input type="text" id="file-path" placeholder="/sdcard/file.txt">
        <div class="grid">
            <button onclick="runCmd('adb shell ip addr')">Network Info</button>
            <button onclick="fileAction('pull')">Pull File</button>
            <button onclick="fileAction('push')">Push File</button>
        </div>
        <div class="output" id="output-net"></div>
    </div>
</div>

<script>
function runCmd(cmd) {
    const output = event.target.textContent.match(/^\w+/) ? document.getElementById('output-info') : 
                   event.target.parentElement.querySelector('.output');
    output.textContent = 'Running: ' + cmd + '...\n';
    fetch('/api/adb', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cmd })
    }).then(r => r.json())
      .then(d => {
          output.textContent = d.result || d.error;
          output.parentElement.appendChild(createStatus(d.success));
      }).catch(e => {
          output.textContent = 'Error: ' + e.message;
          output.parentElement.appendChild(createStatus(false));
      });
}

function appAction(action) {
    const pkg = document.getElementById('pkg-name').value;
    if (!pkg) { alert('Enter package name'); return; }
    const cmds = {
        install: 'adb install app.apk',
        uninstall: `adb uninstall ${pkg}`,
        launch: `adb shell monkey -p ${pkg} -c android.intent.category.LAUNCHER 1`,
        stop: `adb shell am force-stop ${pkg}`
    };
    runCmd(cmds[action]);
}

function fileAction(action) {
    const path = document.getElementById('file-path').value;
    const cmds = {
        pull: `adb pull ${path} .`,
        push: `adb push ${path} /sdcard/`
    };
    runCmd(cmds[action]);
}

function createStatus(ok) {
    const el = document.createElement('div');
    el.className = 'status ' + (ok ? 'ok' : 'err');
    el.textContent = ok ? '✓ Success' : '✗ Failed';
    return el;
}
</script>
</body>
</html>
